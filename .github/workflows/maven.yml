name: Build Project

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Set up JDK 21
        run: mvn -B package --file pom.xml

      - name: Upload dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

      - name: veryfy settings.xml exists in .m2 directory
        run: ls -al ~/.m2

      - name: Build, test, and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.SECRET_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn verify sonar:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=fizryan -Dsonar.projectKey=103022300158_HafizryandinHM_Praktik_MKEPL
